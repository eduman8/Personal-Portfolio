<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Countries PI interface preview</title>
  <desc id="desc">A polished dashboard-style preview of the Countries PI project with search, filters and country cards.</desc>
  <defs>
